<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Cascadia Code','Fira Code',Consolas,monospace" font-size="13">
  <style>
    .t { fill: #d0d0d0; }
    .dim { fill: #6c6c6c; }
    .vio { fill: #af5fff; }
    .cy  { fill: #00d7ff; }
    .grn { fill: #5fff87; }
    .amb { fill: #ffaf00; }
    /* staggered reveal, loops every 14s */
    @keyframes pop { 0% {opacity:0} 3% {opacity:1} 96% {opacity:1} 100% {opacity:0} }
    .s0  { opacity:0; animation: pop 14s infinite 0.2s; }
    .s1  { opacity:0; animation: pop 14s infinite 1.2s; }
    .s2  { opacity:0; animation: pop 14s infinite 2.6s; }
    .s3  { opacity:0; animation: pop 14s infinite 3.4s; }
    .s4  { opacity:0; animation: pop 14s infinite 4.2s; }
    .s5  { opacity:0; animation: pop 14s infinite 5.2s; }
    .s6  { opacity:0; animation: pop 14s infinite 6.4s; }
    .s7  { opacity:0; animation: pop 14s infinite 7.2s; }
    .s8  { opacity:0; animation: pop 14s infinite 8.0s; }
    .s9  { opacity:0; animation: pop 14s infinite 8.8s; }
    .s10 { opacity:0; animation: pop 14s infinite 9.6s; }
    .s11 { opacity:0; animation: pop 14s infinite 10.6s; }
    @keyframes blink { 0%,49% {opacity:1} 50%,100% {opacity:0} }
    .cur { animation: blink 1s infinite; fill:#00d7ff; }
  </style>

  <!-- terminal window -->
  <rect x="0" y="0" width="760" height="420" rx="10" fill="#161616" stroke="#333" stroke-width="1"/>
  <circle cx="22" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="6" fill="#febc2e"/>
  <circle cx="62" cy="20" r="6" fill="#28c840"/>
  <text x="380" y="24" text-anchor="middle" class="dim" font-size="12">aion — the eternal agent</text>

  <!-- user prompt with typing reveal -->
  <g class="s0">
    <rect x="28" y="48" width="704" height="22" fill="#262626"/>
    <rect x="28" y="48" width="3" height="22" fill="#af5fff"/>
    <text x="42" y="63"><tspan class="cy">❯ </tspan><tspan class="t">/council should we rewrite the backend in Rust?</tspan></text>
  </g>

  <!-- council convenes -->
  <text x="32" y="94"  class="s1"><tspan class="vio">🏛 council convened</tspan><tspan class="dim"> — Analyst · Critic · Visionary on 3 models</tspan></text>
  <text x="32" y="116" class="s2"><tspan class="dim">🏛 </tspan><tspan class="cy">Critic</tspan><tspan class="dim"> (glm-4.6:cloud) </tspan><tspan class="grn">✓</tspan><tspan class="dim"> 1.7s</tspan></text>
  <text x="32" y="136" class="s3"><tspan class="dim">🏛 </tspan><tspan class="cy">Visionary</tspan><tspan class="dim"> (gpt-oss:120b-cloud) </tspan><tspan class="grn">✓</tspan><tspan class="dim"> 3.0s</tspan></text>
  <text x="32" y="156" class="s4"><tspan class="dim">🏛 </tspan><tspan class="cy">Analyst</tspan><tspan class="dim"> (deepseek-v3.1:671b-cloud) </tspan><tspan class="grn">✓</tspan><tspan class="dim"> 4.1s</tspan></text>
  <text x="32" y="178" class="s5"><tspan class="amb">✦ Thought: 2.3s</tspan></text>

  <!-- synthesized answer streams in -->
  <text x="32" y="206" class="s6 t">Short answer: <tspan font-weight="bold">not yet — carve out the hot path first.</tspan></text>
  <text x="32" y="230" class="s7"><tspan class="vio">• </tspan><tspan class="t">The Critic found your bottleneck is I/O-bound — Rust won't move that needle</tspan></text>
  <text x="32" y="250" class="s8"><tspan class="vio">• </tspan><tspan class="t">The Analyst priced a full rewrite at ~6 months of feature freeze</tspan></text>
  <text x="32" y="270" class="s9"><tspan class="vio">• </tspan><tspan class="t">The Visionary's middle path: rewrite the matching engine as a Rust service</tspan></text>
  <text x="32" y="296" class="s10"><tspan class="dim">◆ 🏛 council ×3 · deepseek-v3.1:671b-cloud · 12.4s · 318 tok · 41 tok/s</tspan></text>

  <!-- memory learns -->
  <text x="32" y="322" class="s11"><tspan class="dim">⚙ </tspan><tspan class="cy">remember</tspan><tspan class="dim"> {"fact":"Team considering Rust for the matching engine…"} </tspan><tspan class="grn">✓</tspan></text>

  <!-- input bar -->
  <rect x="28" y="354" width="704" height="22" fill="#262626"/>
  <rect x="28" y="354" width="3" height="22" fill="#af5fff"/>
  <text x="42" y="369"><tspan class="cy">❯ </tspan><tspan class="dim">Ask anything…   "/": commands</tspan></text>
  <rect x="60" y="357" width="7" height="15" class="cur"/>
  <rect x="28" y="378" width="704" height="20" fill="#262626"/>
  <text x="42" y="392"><tspan class="dim">aion · </tspan><tspan class="cy">deepseek-v3.1:671b-cloud</tspan><tspan class="dim"> Ollama · router→gpt-oss:20b-cloud</tspan></text>

  <!-- status bar -->
  <text x="32" y="412" class="dim" font-size="12">~/projects</text>
  <text x="728" y="412" text-anchor="end" class="dim" font-size="12">ctrl+p commands · 87 episodes · 34 facts · 6 genes · v3.4.0</text>
</svg>
